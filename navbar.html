<!doctype html>
<html lang="it">
<head>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">

<style>

/* ===== BASE ===== */
body{
  margin:0;
  font-family:Inter, sans-serif;
  background:#07111f;
  color:white;
}

/* ===== NAVBAR ===== */
.nav{
  position:sticky;
  top:0;
  z-index:999;
  background:rgba(7,17,31,0.75);
  backdrop-filter:blur(18px);
  border-bottom:1px solid rgba(255,255,255,0.08);
}

.nav-inner{
  max-width:1200px;
  margin:auto;
  display:flex;
  justify-content:space-between;
  align-items:center;

}

/* LOGO */
.logo{
  display:flex;
  align-items:center;
  gap:10px;
  font-weight:900;
  text-decoration:none;
  color:white;
}

.logo img{
  height:40px;
}

.logo span{
  color:#d7a84f;
}

/* LINKS */
.nav-links{
  display:flex;
  align-items:center;
  gap:18px;
}

.nav-links a{
  text-decoration:none;
  color:#b8c4d6;
  font-weight:600;
  transition:0.3s;
}

.nav-links a:hover{
  color:white;
}

/* WHATSAPP BUTTON */
.btn-whatsapp{
  background:linear-gradient(135deg,#1bd66f,#0fbf5a);
  padding:10px 16px;
  border-radius:999px;
  color:#05120b !important;
  font-weight:900;
  text-decoration:none;
  transition:0.3s;
}

.btn-whatsapp:hover{
  transform:translateY(-2px);
}

</style>
</head>

<body>
