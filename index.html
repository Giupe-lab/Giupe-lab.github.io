<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Fleet Management Aziendale | GV Fleet Consulting</title>
  <meta name="description" content="Soluzioni professionali di fleet management e noleggio lungo termine per PMI, aziende e Partite IVA.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">

  <style>
:root{
  --bg:#07111f;
  --bg2:#0d1b2f;
  --card:#101f35;
  --card2:#13263f;
  --line:rgba(255,255,255,.10);
  --text:#f5f7fb;
  --muted:#b8c4d6;
  --gold:#d7a84f;
  --gold2:#f2cc7b;
  --blue:#4da3ff;
  --green:#20c997;
  --shadow:0 24px 70px rgba(0,0,0,.35);
}

*{box-sizing:border-box}
html{scroll-behavior:smooth}

body{
  margin:0;
  font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  color:var(--text);
  background:
    radial-gradient(circle at top right,rgba(77,163,255,.22),transparent 35%),
    radial-gradient(circle at top left,rgba(215,168,79,.20),transparent 28%),
    linear-gradient(180deg,var(--bg),#050912 70%);
  line-height:1.6;
}

a{color:inherit;text-decoration:none}
img{max-width:100%;display:block}

.container{width:min(1180px,92%);margin:auto}

/* NAVBAR */
.nav{
  position:sticky;
  top:0;
  z-index:999;
  background:rgba(7,17,31,.75);
  backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(255,255,255,.08);
  transition:.3s ease;
}

.nav-inner{
  min-height:78px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}

.logo{
  display:flex;
  align-items:center;
  gap:10px;
  font-weight:900;
}

.logo img{
  height:41px;
  width:auto;
}

.logo span{
  color:var(--gold);
}

.nav-links{
  display:flex;
  align-items:center;
  gap:18px;
  font-weight:650;
  color:var(--muted);
}

.nav-links a:hover{
  color:#fff;
}

.nav-links a.active{
  color:#fff;
  font-weight:900;
  border-bottom:2px solid var(--gold);
}

/* BUTTON */
.btn{
  padding:12px 18px;
  border-radius:999px;
  font-weight:900;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:#07111f;
  display:inline-flex;
  align-items:center;
  justify-content:center;
}

.btn.whatsapp{
  background:linear-gradient(135deg,#1bd66f,#0fbf5a);
  color:#05120b;
}

/* HERO */
.hero{padding:90px 0}

h1{
  font-size:clamp(2.2rem,5vw,4.5rem);
  line-height:1;
  margin:0 0 20px;
}

p{color:var(--muted)}

.section{padding:70px 0}

  </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="nav">
  <div class="container nav-inner">

    <a class="logo" href="index.html">
      <img src="logo.png" alt="GV Fleet Consulting">
      <span>Fleet Consulting</span>
    </a>

    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="fleet.html">La mia flotta</a>
      <a href="simulatore.html">Simulatore</a>
      <a href="case-study.html">Case Study</a>
      <a href="storychisiamo.html">Chi siamo</a>

      <a class="btn whatsapp" href="https://api.whatsapp.com/send?text=Ciao" target="_blank">
        WhatsApp
      </a>
    </div>

  </div>
</nav>

<!-- CONTENUTO -->
<main class="container hero">
  <h1>Fleet Management Aziendale</h1>
  <p>Versione stabile e funzionante del sito.</p>
</main>

<!-- JS UNICO PULITO -->
<script>
const links = document.querySelectorAll(".nav-links a");

links.forEach(a => {
  if (a.href === window.location.href) {
    a.classList.add("active");
  }
});

let lastScrollTop = 0;
const nav = document.querySelector('.nav');

window.addEventListener('scroll', function () {
  const currentScroll = window.pageYOffset || document.documentElement.scrollTop;

  if (currentScroll > 80) {
    nav.style.background = "rgba(7,17,31,.9)";
  } else {
    nav.style.background = "rgba(7,17,31,.75)";
  }

  lastScrollTop = currentScroll <= 0 ? 0 : currentScroll;
});
</script>

</body>
</html>
