<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>La mia flotta | GV Fleet Consulting</title>
<meta name="description" content="Soluzioni e categorie per flotte aziendali: city car, compatte ed executive premium.">

<style>
:root{--bg:#07111f;--line:rgba(255,255,255,.12);--text:#f5f7fb;--muted:#b8c4d6;--gold:#d7a84f;--gold2:#f2cc7b;--green:#20c997;--shadow:0 24px 70px rgba(0,0,0,.35)}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;font-family:Inter,Arial,sans-serif;color:var(--text);background:radial-gradient(circle at top right,rgba(77,163,255,.18),transparent 34%),radial-gradient(circle at top left,rgba(215,168,79,.16),transparent 28%),linear-gradient(180deg,#050b16,#02050c 82%);line-height:1.6}
a{color:inherit;text-decoration:none}.container{width:min(1180px,92%);margin:auto}

/* ===== TUTTO IL TUO CSS INVARIATO ===== */
.nav{position:sticky;top:0;z-index:999;background:rgba(7,17,31,.86);backdrop-filter:blur(16px);border-bottom:1px solid var(--line);transition:transform .35s ease,background .35s ease,box-shadow .35s ease}
.nav.scrolled{background:rgba(7,17,31,.94);box-shadow:0 16px 40px rgba(0,0,0,.25)}
.nav-inner{min-height:64px;padding:8px 0;display:flex;align-items:center;justify-content:space-between;gap:20px}
.logo{display:flex;align-items:center;gap:10px;font-weight:900;white-space:nowrap}
.logo img{height:56px;width:auto;display:block}
.logo span{color:#fff}
.nav-links{display:flex;flex-wrap:wrap;gap:16px;align-items:center;color:var(--muted);font-weight:700;font-size:.95rem}
.nav-links a{position:relative;transition:all .2s ease}
.nav-links a:hover,.nav-links a.active{color:#fff}
.nav-links a:not(.btn)::after{content:"";position:absolute;left:0;bottom:-6px;width:0;height:2px;background:var(--gold);transition:width .25s ease}
.nav-links a:hover::after,.nav-links a.active::after{width:100%}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:10px;padding:13px 18px;border-radius:999px;font-weight:900;border:1px solid transparent;cursor:pointer}
.btn.primary{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#07111f}
.btn.secondary{background:rgba(255,255,255,.08);color:#fff;border-color:var(--line)}
.btn.whatsapp{background:linear-gradient(135deg,#19d96f,#0eb85a);color:#04130a}
.btn.email{background:rgba(255,255,255,.08);color:#fff;border-color:var(--line)}

/* resto invariato... */
.hero{padding:92px 0 64px}
.hero-grid{display:grid;grid-template-columns:1.08fr .92fr;gap:48px;align-items:center}
.eyebrow{display:inline-flex;color:var(--gold2);font-weight:900;text-transform:uppercase;letter-spacing:.13em;font-size:.78rem;margin-bottom:14px}
h1{font-size:clamp(2.55rem,5vw,5.4rem);line-height:.98;letter-spacing:-.06em;margin:0 0 22px}
h2{font-size:clamp(2rem,3.6vw,3.35rem);line-height:1.05;letter-spacing:-.045em;margin:0 0 14px}
h3{margin:0 0 10px;font-size:1.2rem}
p{color:var(--muted);margin:0 0 18px}
.lead{font-size:1.18rem;max-width:720px;color:#d8e1ef}
.actions{display:flex;flex-wrap:wrap;gap:14px;margin-top:30px}

.hero-card,.card,.band{
background:linear-gradient(180deg,rgba(255,255,255,.10),rgba(255,255,255,.045));
border:1px solid var(--line);
box-shadow:var(--shadow)
}

.hero-card{padding:30px;border-radius:34px}
.badge{display:inline-flex;padding:7px 11px;border-radius:999px;background:rgba(77,163,255,.14);color:#c8e6ff;font-size:.78rem;font-weight:900;margin-bottom:14px}

.section{padding:70px 0}
.section-head{display:flex;align-items:end;justify-content:space-between;gap:28px;margin-bottom:30px}
.grid{display:grid;gap:18px}
.grid-3{grid-template-columns:repeat(3,1fr)}
.card{padding:26px;border-radius:28px;box-shadow:0 18px 48px rgba(0,0,0,.18);overflow:hidden}
.band{padding:34px;border-radius:34px;background:linear-gradient(135deg,rgba(215,168,79,.16),rgba(77,163,255,.12));display:flex;align-items:center;justify-content:space-between;gap:22px}

/* footer invariato */
.footer{margin-top:80px;padding:60px 0 30px;border-top:1px solid var(--line);background:linear-gradient(180deg,rgba(8,18,34,.92),rgba(4,8,17,1))}
.footer-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:40px}
.footer-bottom{margin-top:40px;padding-top:20px;border-top:1px solid var(--line);text-align:center;color:var(--muted);font-size:.9rem}

@media(max-width:900px){
.hero-grid,.grid-3{grid-template-columns:1fr}
.footer-grid{grid-template-columns:1fr}
.nav-inner{flex-direction:column;align-items:flex-start}
}
</style>
</head>

<body>

<!-- ✅ NAVBAR ESTERNA (AGGIUNTA SENZA TOCCARE IL RESTO) -->
<link rel="stylesheet" href="navbar.css">
<div id="navbar"></div>
<script src="navbar.js"></script>

<main>

<!-- TUTTO IL TUO CONTENUTO IDENTICO -->
<section class="hero">
  <div class="container hero-grid">
    <div>
      <div class="eyebrow">La mia flotta</div>
      <h1>Auto e veicoli per aziende che vogliono muoversi meglio.</h1>
      <p class="lead">Una selezione ordinata e stabile per orientare il cliente verso la soluzione più adatta.</p>
    </div>
  </div>
</section>

<!-- resto invariato -->
</main>

<footer class="footer">
  <div class="container footer-grid">
    <div>
      <h4>GV Fleet Consulting</h4>
      <p>Soluzioni di noleggio lungo termine.</p>
    </div>
  </div>
  <div class="footer-bottom">© 2026 GV Solutions — Tutti i diritti riservati</div>
</footer>

</body>
</html>
